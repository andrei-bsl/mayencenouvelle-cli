project_name: mayencenouvelle-cli

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: mayence
    main: ./cmd/main.go
    binary: mayence
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildDate={{.Date}}

archives:
  - id: mayence
    format: tar.gz
    name_template: >-
      mayence_{{.Version}}_{{.Os}}_{{.Arch}}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: mayencenouvelle
    name: mayencenouvelle-cli
  name_template: "v{{.Version}}"
  prerelease: auto
